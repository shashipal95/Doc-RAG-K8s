apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docchat-backend-uploads-pvc
  labels:
    app: docchat-backend
spec:
  accessModes:
    - ReadWriteOnce # Note: Use ReadWriteMany (RWX) if scaling to >1 replicas to share the uploads dir
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docchat-backend
  labels:
    app: docchat-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docchat-backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: docchat-backend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: backend
          image: shashipal95/docchat-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: docchat-config
            - secretRef:
                name: rag-secret
          env:
            - name: QDRANT_URL
              valueFrom:
                configMapKeyRef:
                  name: docchat-config
                  key: QDRANT_URL
            - name: MLFLOW_HTTP_REQUEST_TIMEOUT
              value: "2"
            - name: MLFLOW_HTTP_REQUEST_MAX_RETRIES
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: docchat-backend-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docchat-backend
  labels:
    app: docchat-backend
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: docchat-backend
  type: ClusterIP
