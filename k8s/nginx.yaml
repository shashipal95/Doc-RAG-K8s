# -----------------------------------------------------------
# Nginx reverse proxy for Kubernetes
# ConfigMap holds the nginx.conf with K8s service hostnames
# -----------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  labels:
    app: docchat-nginx
data:
  default.conf: |
    server {
        listen 80;

        # Health check endpoint – proxied to backend's actual path
        location /health {
            proxy_pass http://docchat-backend:8000/api/v1/health;
        }

        # API requests – forward to backend
        location /api/ {
            proxy_pass http://docchat-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # Uploads – forward to backend
        location /uploads/ {
            proxy_pass http://docchat-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MLflow – forward to mlflow server
        location /mlflow/ {
            proxy_pass http://docchat-mlflow:5000/mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other traffic – serve frontend
        location / {
            proxy_pass http://docchat-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docchat-nginx
  labels:
    app: docchat-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docchat-nginx
  template:
    metadata:
      labels:
        app: docchat-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: docchat-nginx
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: docchat-nginx
  type: LoadBalancer
