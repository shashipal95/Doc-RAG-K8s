apiVersion: apps/v1
kind: Deployment
metadata:
  name: docchat-frontend
  labels:
    app: docchat-frontend
spec:
  replicas: 2 # Frontend is stateless, so we can run multiple replicas for high availability
  selector:
    matchLabels:
      app: docchat-frontend
  template:
    metadata:
      labels:
        app: docchat-frontend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: frontend
          image: shashipal95/docchat-frontend:latest # Adjust image tag as needed for container registry
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              find /app/.next -type f -name '*.js' -exec sed -i 's|http://localhost:8000||g' {} +
              exec node server.js
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: docchat-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: docchat-frontend
  labels:
    app: docchat-frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: docchat-frontend
  type: ClusterIP # Nginx reverse proxy is now the public entry point
