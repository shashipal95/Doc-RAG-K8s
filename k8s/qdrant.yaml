apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docchat-qdrant-pvc
  labels:
    app: docchat-qdrant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docchat-qdrant
  labels:
    app: docchat-qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docchat-qdrant
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: docchat-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: docchat-qdrant-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docchat-qdrant
  labels:
    app: docchat-qdrant
spec:
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  selector:
    app: docchat-qdrant
  type: ClusterIP
