apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: docchat-backend-monitor
  namespace: default
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: docchat-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: docchat-qdrant-monitor
  namespace: default
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: docchat-qdrant
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docchat-grafana-dashboard
  namespace: default
  labels:
    grafana_dashboard: "1"
data:
  docchat-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Total Requests Completed",
          "type": "stat",
          "id": 11,
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(llm_requests_total) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "none"
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value"
          }
        },
        {
          "title": "Total Generated Tokens",
          "type": "stat",
          "id": 12,
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(llm_generation_tokens_total) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "none"
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value"
          }
        },
        {
          "title": "Total Prompt Tokens",
          "type": "stat",
          "id": 13,
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(llm_prompt_tokens_total) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "none"
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value"
          }
        },
        {
          "title": "Avg. Tokens / Request",
          "type": "stat",
          "id": 14,
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "(sum(llm_prompt_tokens_total) + sum(llm_generation_tokens_total)) / sum(llm_requests_total) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "none"
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value"
          }
        },
        {
          "title": "End-to-End Request Latency",
          "type": "timeseries",
          "id": 21,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(llm_request_duration_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p95 {{provider}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(llm_request_duration_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p50 {{provider}}",
              "refId": "B"
            },
            {
              "expr": "sum(rate(llm_request_duration_seconds_sum[5m])) by (provider) / sum(rate(llm_request_duration_seconds_count[5m])) by (provider)",
              "legendFormat": "Average {{provider}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "s"
            }
          }
        },
        {
          "title": "Time To First Token (TTFT) Latency",
          "type": "timeseries",
          "id": 22,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(llm_time_to_first_token_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p95 {{provider}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(llm_time_to_first_token_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p50 {{provider}}",
              "refId": "B"
            },
            {
              "expr": "sum(rate(llm_time_to_first_token_seconds_sum[5m])) by (provider) / sum(rate(llm_time_to_first_token_seconds_count[5m])) by (provider)",
              "legendFormat": "Average {{provider}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "s"
            }
          }
        },
        {
          "title": "Token Throughput (tokens/sec)",
          "type": "timeseries",
          "id": 31,
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(llm_prompt_tokens_total[1m])) by (provider)",
              "legendFormat": "Prompt Tokens/Sec ({{provider}})",
              "refId": "A"
            },
            {
              "expr": "sum(rate(llm_generation_tokens_total[1m])) by (provider)",
              "legendFormat": "Generation Tokens/Sec ({{provider}})",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "ops"
            }
          }
        },
        {
          "title": "Request Prompt Length Distribution",
          "type": "heatmap",
          "id": 41,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(llm_prompt_tokens_bucket[5m])) by (le)",
              "format": "heatmap",
              "legendFormat": "{{le}}",
              "refId": "A"
            }
          ],
          "options": {
            "calculate": false,
            "color": { "mode": "scheme", "scheme": "Oranges" }
          }
        },
        {
          "title": "Request Generation Length Distribution",
          "type": "heatmap",
          "id": 42,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(llm_generation_tokens_bucket[5m])) by (le)",
              "format": "heatmap",
              "legendFormat": "{{le}}",
              "refId": "A"
            }
          ],
          "options": {
            "calculate": false,
            "color": { "mode": "scheme", "scheme": "Blues" }
          }
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["docchat", "llmops", "rag"],
      "title": "DocChat LLM Performance Dashboard",
      "timezone": "",
      "weekStart": ""
    }
